# fly.toml — Fly.io deployment for BIMoryn REST API
# Deploy: fly launch --no-deploy && fly deploy
# Docs:   https://fly.io/docs/reference/configuration/

app = "bimoryn-api"
primary_region = "ams"  # Amsterdam — closest to NL/BE/DE pilot market

[build]
  dockerfile = "Dockerfile.api"

[env]
  PORT = "8000"

# BIMORYN_API_KEY must be set as a secret:
#   fly secrets set BIMORYN_API_KEY=<your-key>

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
    tls_options = { alpn = ["h2", "http/1.1"] }

  [[services.ports]]
    handlers = ["http"]
    port = 80
    [services.ports.force_https]
      enabled = true

  [services.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[resources]
  memory = "512mb"
  cpus = 1
