name: Benchmark

on:
  push:
    branches: [main, master]

jobs:
  benchmark:
    name: Performance benchmark + regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[bench]"

      # Save committed baseline before generating new results
      - name: Save baseline
        run: |
          if [ -f benchmarks/results/latest.json ]; then
            cp benchmarks/results/latest.json benchmarks/results/baseline.json
          fi

      - name: Generate fixtures
        run: python benchmarks/generate_fixtures.py

      - name: Run benchmarks (small + medium only for CI speed)
        run: |
          python benchmarks/run_benchmarks.py \
            --no-generate \
            --sizes small medium \
            --repeats 2 \
            --out benchmarks/results/latest.json

      - name: Check regression vs baseline (20% threshold)
        run: |
          if [ -f benchmarks/results/baseline.json ]; then
            python benchmarks/check_regression.py \
              --baseline benchmarks/results/baseline.json \
              --current benchmarks/results/latest.json \
              --threshold 20
          else
            echo "No baseline found — skipping regression check (first run)"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/
