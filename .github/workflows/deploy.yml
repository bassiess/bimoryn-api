name: Deploy to Fly.io

# Fires on every push to master/main once FLY_API_TOKEN is set
# as a GitHub repo secret (Settings → Secrets → Actions).
#
# Setup (one-time, ~5 min — board only):
#   1. Go to https://fly.io → sign up / log in (free tier, no credit card for first deploy)
#   2. Go to: https://fly.io/user/personal_access_tokens → create a token
#   3. In GitHub repo → Settings → Secrets → Actions → New repository secret
#      Name: FLY_API_TOKEN   Value: <paste token>
#   4. Push any commit to master → workflow deploys automatically
#   5. Live URL: https://bimoryn-api.fly.dev/health → should return {"status":"ok"}
#
# No CLI needed. No dashboard connection. No credit card required for MVP traffic.

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --dockerfile Dockerfile.api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set API keys on Fly.io
        run: |
          flyctl secrets set \
            BIMORYN_API_KEY=bim_uLNkHebLnRbIXnJYi8LFeMBt \
            "BIMORYN_API_KEYS=bim_t74Tg3r6lWFsrfmQrsKTjJsH-HmEgZDg,bim_KeksgC3JBVsNFPHTYLjaUO4UialTvG4x,bim_ecXinXqS1mUV5skAIATmoNuyDgLUKNvu,bim_7QPQLoREnybgMWUveeW8IazueOd2QFt2" \
            --app bimoryn-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # Per-pilot key assignments:
        #   bim_t74Tg3r6lWFsrfmQrsKTjJsH-HmEgZDg — Andrii Bondarenko
        #   bim_KeksgC3JBVsNFPHTYLjaUO4UialTvG4x — Manoe Singh
        #   bim_ecXinXqS1mUV5skAIATmoNuyDgLUKNvu — Victoria Werner
        #   bim_7QPQLoREnybgMWUveeW8IazueOd2QFt2 — Younes Hasnaoui

      - name: Health check
        run: |
          echo "Waiting 30s for Fly.io to finalize rollout..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bimoryn-api.fly.dev/health)
          echo "/health returned: $STATUS"
          [ "$STATUS" -eq 200 ] || (echo "Health check failed — check Fly.io dashboard" && exit 1)

      - name: Print live URL
        run: echo "API live at https://bimoryn-api.fly.dev"
