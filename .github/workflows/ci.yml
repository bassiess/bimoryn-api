name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check bimoryn/ tests/ benchmarks/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=bimoryn --cov-report=term-missing --cov-fail-under=70
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  api-smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + deps
        run: pip install -e ".[dev]"
      - name: Start API server in background
        run: |
          uvicorn bimoryn.api:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/api.pid
          # Wait up to 15s for the server to be ready
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:8000/health && break || sleep 1
          done
      - name: Assert /health returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health)
          [ "$STATUS" -eq 200 ] || (echo "/health returned $STATUS" && exit 1)
      - name: Assert /health body is valid JSON with status=ok
        run: |
          curl -sf http://127.0.0.1:8000/health | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Unexpected status: {d}'
          assert d['rules_loaded'] > 0, 'No rules loaded'
          print(f\"Health OK — {d['rules_loaded']} rules loaded\")
          "
      - name: Stop API server
        if: always()
        run: kill $(cat /tmp/api.pid) 2>/dev/null || true

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t bimoryn:ci-test .
      - name: Smoke test container
        run: docker run --rm bimoryn:ci-test --help
